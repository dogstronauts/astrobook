name: CI Pipeline

on:
  push:
    branches: [ '1.0' ]
  pull_request:
    branches: [ '1.0' ]
  schedule:
    - cron: '0 0 * * 0' # weekly on Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ci-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    uses: ./.github/workflows/validation.yaml
    secrets: inherit

  security:
    needs: validation
    uses: ./.github/workflows/security.yaml
    secrets: inherit

  code-quality:
    needs: security
    uses: ./.github/workflows/code-quality.yaml
    secrets: inherit

  tests:
    needs: code-quality
    uses: ./.github/workflows/tests.yaml
    secrets: inherit

  openapi-consistency:
    needs: tests
    uses: ./.github/workflows/openapi-consistency.yaml
    secrets: inherit
